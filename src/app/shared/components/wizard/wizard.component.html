<div class="nadra-bg-container shadow-lg">
  <div class="wizard-header">
    <div class="d-flex align-items-center gap-2">
      <i class="bi bi-gear-wide-connected"></i>
      <h4 class="m-0 fw-bold">{{ title }}</h4>
    </div>
    <ng-content select="[wizard-header-actions]"></ng-content>
  </div>

  <div class="wizard-stepper">
    @for (step of steps; track step; let i = $index; let isLast = $last) {
      <div class="step-box" [class.active]="currentStep >= (i + 1)">
        <div class="step-num">{{ i + 1 }}</div>
        <span class="step-name">{{ step }}</span>
      </div>
      @if (!isLast) { <div class="step-bar" [class.active]="currentStep > (i + 1)"></div> }
    }
  </div>

  <div class="wizard-content">
    <ng-content></ng-content>
  </div>

  <div class="wizard-footer">
    @if (currentStep > 1) {
      <button type="button" class="btn btn-light fw-bold" (click)="previous.emit()" [disabled]="isSaving">
        <i class="bi bi-arrow-left"></i> Previous
      </button>
    }
    <button type="button" class="btn-custom ms-auto" style="width: auto; padding: 0 2rem;" (click)="next.emit()" [disabled]="isSaving">
      @if (isSaving) { Saving... } @else { {{ isLastStep ? finalStepText : 'Save & Next' }} <i class="bi bi-arrow-right"></i> }
    </button>
  </div>
</div>
