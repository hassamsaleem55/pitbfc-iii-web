<div class="auth-wrapper">
  <div class="card-custom auth-card shadow-lg">
    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-subtitle">Sign in to your account to continue</p>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="nadra-label">Username</label>
        <input type="text" class="input-custom" formControlName="username" placeholder="Enter your username">
      </div>
      <div class="mb-4">
        <div class="d-flex justify-content-between mb-1">
          <label class="nadra-label mb-0">Password</label>
          <a routerLink="/forgot-password" class="text-primary small text-decoration-none fw-bold">Forgot?</a>
        </div>
        <input type="password" class="input-custom" formControlName="password" placeholder="••••••••">
      </div>
      <button type="submit" class="btn-custom" [disabled]="loginForm.invalid || isSubmitting">
        @if (isSubmitting) { Signing in... } @else { Sign In <i class="bi bi-arrow-right"></i> }
      </button>
    </form>
    <div class="text-center mt-4">
      <span class="text-muted small">Don't have an account? </span>
      <a routerLink="/signup" class="text-primary small text-decoration-none fw-bold">Register</a>
    </div>
  </div>
</div>
